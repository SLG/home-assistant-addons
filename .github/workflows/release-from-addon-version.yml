name: Create release from addon version

on:
  push:
    branches:
      - master
      - main
    paths:
      - spotify-sync/config.yaml
      - spotify-sync/package.json
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override (for example: 1.2.3 or v1.2.3). If not provided, bumps minor version automatically."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version and bump to next minor
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          input_version = (os.environ.get("INPUT_VERSION") or "").strip()

          config_text = Path("spotify-sync/config.yaml").read_text(encoding="utf-8")
          match = re.search(r"(?m)^version:\s*(\S+)\s*$", config_text)
          if not match:
              raise RuntimeError("Could not read version from spotify-sync/config.yaml")

          config_version = match.group(1).strip().strip('"\'')
          package_version = json.loads(Path("spotify-sync/package.json").read_text(encoding="utf-8")).get("version", "").strip()

          if config_version != package_version:
              raise RuntimeError(
                  f"Version mismatch: config.yaml={config_version}, package.json={package_version}"
              )

          current_version = config_version

          if input_version:
              normalized_input = input_version[1:] if input_version.startswith("v") else input_version
              if not re.match(r"^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$", normalized_input):
                  raise RuntimeError(f"Version '{normalized_input}' is not semver-like")
              new_version = normalized_input
          else:
              if not re.match(r"^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$", current_version):
                  raise RuntimeError(f"Version '{current_version}' is not semver-like")

              parts = current_version.split('.')
              major = int(parts[0])
              minor = int(parts[1])
              patch_str = parts[2].split('-')[0].split('+')[0]
              patch = int(patch_str)

              minor += 1
              patch = 0

              new_version = f"{major}.{minor}.{patch}"

          tag = f"spotify-sync-v{new_version}"

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as output:
              output.write(f"value={new_version}\n")
              output.write(f"tag={tag}\n")
              output.write(f"previous_tag=spotify-sync-v{current_version}\n")

          print(f"Current version: {current_version}")
          print(f"New version: {new_version}")
          print(f"New tag: {tag}")
          PY

      - name: Stop if tag already exists
        id: tag_exists
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists. Skipping release creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version files
        if: steps.tag_exists.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]

          config_path = Path("spotify-sync/config.yaml")
          config_text = config_path.read_text(encoding="utf-8")
          config_text, count = re.subn(r"(?m)^version:\s*.*$", f"version: {version}", config_text, count=1)
          if count != 1:
              raise RuntimeError("Could not find a single 'version:' line in spotify-sync/config.yaml")
          config_path.write_text(config_text, encoding="utf-8")

          package_path = Path("spotify-sync/package.json")
          package_data = json.loads(package_path.read_text(encoding="utf-8"))
          package_data["version"] = version
          package_path.write_text(json.dumps(package_data, indent=2) + "\n", encoding="utf-8")

          print(f"Updated both files to version {version}")
          PY

      - name: Update changelog
        if: steps.tag_exists.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.value }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          version = os.environ["VERSION"]
          previous_tag = os.environ["PREVIOUS_TAG"]
          changelog_path = Path("spotify-sync/CHANGELOG.md")

          log_result = subprocess.run(
              [
                  "git",
                  "log",
                  "--no-merges",
                  "--pretty=format:%h\t%s",
                  f"{previous_tag}..HEAD",
              ],
              check=True,
              capture_output=True,
              text=True,
          )

          commits = []
          for line in log_result.stdout.splitlines():
              line = line.strip()
              if not line:
                  continue
              short_hash, subject = line.split("\t", 1)
              if subject.startswith("chore: bump addon version to "):
                  continue
              commits.append((short_hash, subject))

          if commits:
              commit_lines = "\n".join(f"- `{short_hash}` — {subject}" for short_hash, subject in commits)
          else:
              commit_lines = "- No commits found."

          section = (
              f"## v{version}\n\n"
              f"Changes since `{previous_tag}`:\n\n"
              f"{commit_lines}\n"
          )

          content = changelog_path.read_text(encoding="utf-8") if changelog_path.exists() else "# Changelog\n\n## Unreleased\n\n"
          if "## Unreleased" in content:
              prefix, _, suffix = content.partition("## Unreleased")
              suffix = suffix.lstrip("\n")
              next_release = re.search(r"(?m)^## \S", suffix)
              history = suffix[next_release.start():] if next_release else ""
              content = f"{prefix}## Unreleased\n\n{section}\n{history.lstrip()}"
          else:
              content = f"{content.rstrip()}\n\n## Unreleased\n\n{section}"

          changelog_path.write_text(content.rstrip() + "\n", encoding="utf-8")
          print(f"Updated {changelog_path} with release notes for v{version}")
          PY

      - name: Commit version bump
        if: steps.tag_exists.outputs.exists == 'false'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spotify-sync/config.yaml spotify-sync/package.json spotify-sync/CHANGELOG.md
          git commit -m "chore: bump addon version to $VERSION"
          git push origin HEAD:${{ github.event.repository.default_branch || github.ref_name }}

      - name: Create and push tag
        if: steps.tag_exists.outputs.exists == 'false'
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Spotify Sync addon $VERSION"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.tag_exists.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Spotify Sync v${{ steps.version.outputs.value }}
          generate_release_notes: true
